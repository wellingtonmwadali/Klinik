name: Klinik API CI

on:
  push:
    branches:
      - main
      - feature
    paths:
      - "klinik-api/**"
      - ".github/workflows/klinik-api-ci.yml"

  pull_request:
    branches:
      - main
      - feature
    paths:
      - "klinik-api/**"
      - ".github/workflows/klinik-api-ci.yml"

defaults:
  run:
    working-directory: klinik-api

env:
  DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
  SECRET_KEY: test-secret-key
  DEBUG: "False"

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Check for missing migrations
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: |
          pytest --cov=apps --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run Ruff
        run: |
          ruff check .

  formatting:
    name: Black
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Check formatting
        run: |
          black --check .

  security:
    name: Bandit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Security scan
        run: |
          bandit -r apps config