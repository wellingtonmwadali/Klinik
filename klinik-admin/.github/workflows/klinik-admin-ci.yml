name: klinik-admin CI

on:
  push:
    branches: [main]
    paths:
      - 'klinik-admin/**'
      - '.github/workflows/klinik-admin-ci.yml'
  pull_request:
    paths:
      - 'klinik-admin/**'
      - '.github/workflows/klinik-admin-ci.yml'

defaults:
  run:
    working-directory: klinik-admin

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: klinik-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DJANGO_API_URL: http://localhost:8000
