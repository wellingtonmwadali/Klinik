name: Klinik Admin CI

on:
 push:
    branches:
      - main
    paths:
      - "klinik-admin/**"
      - ".github/workflows/klinik-admin-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "klinik-admin/**"
      - ".github/workflows/klinik-admin-ci.yml"

defaults:
  run:
    working-directory: klinik-admin

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: klinik-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          DJANGO_API_URL: https://klinik-xhmb.onrender.com
          NODE_ENV: production
