[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = apps tests
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --reuse-db

[coverage:run]
source = apps
omit = 
    */migrations/*
    */tests/*
    */admin.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[tool:pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
